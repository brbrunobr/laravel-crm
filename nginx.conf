# Nginx para Laravel/Krayin - UTF-8
user www-data;
worker_processes auto;
pid /run/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Charset UTF-8
    charset utf-8;

    # Logs
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Tamanho máximo de upload
    client_max_body_size 32m;
    client_body_buffer_size 128k;

    # Timeouts
    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        # Charset
        charset utf-8;

        # Healthcheck
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK";
        }

        # Rota principal
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Assets estáticos
        location ~* \.(css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?|ttf|eot)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # Bloqueia arquivos sensíveis
        location ~ /\.(?!well-known) {
            deny all;
        }

        # PHP
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # PHP-FPM
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            
            # Parâmetros FastCGI
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Headers para proxy
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host if_not_empty;
            
            # Buffers
            fastcgi_buffer_size 128k;
            fastcgi_buffers 8 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            
            # Timeouts
            fastcgi_read_timeout 300;
        }

        # Logs de erro para debug
        error_log /dev/stderr debug;
    }
}