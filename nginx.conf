# ---------------------------------------------------------------------------
# Nginx para Laravel/Krayin em Docker
# - Serve /public como DocumentRoot
# - Encaminha .php para PHP-FPM em 127.0.0.1:9000
# - Gzip básico e cache de estáticos
# - Healthcheck em /health
# - client_max_body_size para uploads maiores
# - Usa $realpath_root para evitar problemas com symlinks (storage:link)
# ---------------------------------------------------------------------------

user  www-data;
worker_processes  auto;
pid /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # -------------------------- Básico / Desempenho --------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Logs no STDOUT/STDERR (o supervisor redireciona para logs do container)
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # TLS listado (mesmo atrás de proxy, não atrapalha)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Tamanho máximo de upload (ajuste conforme sua necessidade)
    client_max_body_size 32m;

    # ----------------------------- Servidor ----------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # DocumentRoot do Laravel (importante: /public)
        root   /var/www/html/public;
        index  index.php index.html index.htm;

        # Healthcheck simples (retorna 200) — útil para liveness probes
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK";
        }

        # Rota padrão: tenta arquivo/pasta físico, senão envia ao front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Cache agressivo de assets estáticos (ajuste paths conforme seu build)
        location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|webp|ico|woff2?|ttf)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # Bloqueia acesso a arquivos sensíveis/ocultos (.ht*, .env, etc.)
        location ~ /\.(?!well-known) {
            deny all;
        }

        # --------------------------- PHP → FPM --------------------------------
        location ~ \.php$ {
            # Se o arquivo PHP não existir, 404 direto (evita fallback perigoso)
            try_files $fastcgi_script_name =404;

            # Corrige PATH_INFO (útil para alguns scripts)
            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            # Upstream do PHP-FPM (supervisor sobe php-fpm escutando nesta porta)
            fastcgi_pass 127.0.0.1:9000;

            # Parâmetros padrão do FastCGI
            include fastcgi_params;

            # Usa realpath_root para resolver symlinks (ex.: public/storage)
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT  $realpath_root;
            fastcgi_param PATH_INFO      $fastcgi_path_info;

            # Tempo maior para scripts mais pesados (ajuste conforme necessidade)
            fastcgi_read_timeout 300;

            # Buffers (evita 502 em respostas grandes do PHP)
            fastcgi_buffer_size 32k;
            fastcgi_buffers 8 32k;

            # Passa informação de HTTPS/Proxy ao PHP (ajuda a gerar URLs corretas)
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
            fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        }
    }
}
